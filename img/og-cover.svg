    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <g transform="translate(96, 96)">
    <text font-family="'JetBrains Mono', monospace" font-weight="700" font-size="22" fill="#9CA3AF" letter-spacing="2">// SIERRA TECH_LAB</text>
  </g>
  <g transform="translate(96, 180)">
    <text font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700" font-size="92" fill="#DCE2F3" letter-spacing="-2">Arquitectura</text>
    <text y="100" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700" font-size="92" fill="#2EDC1B" letter-spacing="-2">Tecnológica.</text>
  </g>
  <g transform="translate(96, 470)">
    <text font-family="'Geist', 'Inter', sans-serif" font-size="28" fill="#9CA3AF">Micro-soldadura · Reparación · Web a medida</text>
  </g>
  <g transform="translate(96, 540)">
